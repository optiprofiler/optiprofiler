name: MATLAB full unit regression

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run:
    name: Generate coverage report for MATLAB ${{ matrix.matlab }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        matlab: [latest]
        with_optim_toolbox: [yes]

    steps:

      - name: Check out requested revision with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate MATLAB problem-library lock
        run: python3 tools/check_matlab_problem_libraries_lock.py

      - name: Cache MATLAB  # N.B.: Clear the cache when the `latest` version of MATLAB changes in March and September
        uses: actions/cache@v4
        with:
          path: ${{ runner.tool_cache }}/MATLAB
          key: ${{ matrix.os }}-${{ matrix.matlab }}

      - name: Set up MATLAB with optimization toolbox
        if: ${{ matrix.with_optim_toolbox == 'yes' }}
        uses: matlab-actions/setup-matlab@v2
        with:
          release: ${{ matrix.matlab }}
          products: Optimization_Toolbox Parallel_Computing_Toolbox

      - name: Setup OptiProfiler and run tests
        uses: matlab-actions/run-command@v2.1.1
        with:
          command: |
            % Setup OptiProfiler
            % Core unit tests exercise the bundled default only. Optional
            % libraries have separately locked repositories and integration
            % gates, so do not install them on this fast path.
            options = struct('install_matcutest', false, 'install_solar', false);
            setup(options);
            
            % Run tests
            cd matlab/optiprofiler/
            runTests

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v1
        with:
          file: ./matlab/optiprofiler/coverage.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unit_test_out
          path: ./matlab/optiprofiler/tests/unit_tests/unit-test/**
