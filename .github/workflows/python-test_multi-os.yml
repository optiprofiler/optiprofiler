# Python test multi-OS: Test all 11 features on multiple OS and Python versions

name: Python test multi-OS

on:
  push:
    branches: [main, python]
  pull_request:
    branches: [main, python]
  workflow_dispatch:

jobs:

  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CUTEst on Linux
        if: ${{ runner.os == 'Linux' }}
        run: bash .github/actions/test-python/install-cutest.sh

      - name: Install package
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            export PYCUTEST_CACHE=$GITHUB_WORKSPACE
            python -m pip install --progress-bar=off ".[extra,tests]"
          else
            python -m pip install --progress-bar=off ".[tests]"
          fi
        shell: bash

      - name: Configure s2mpj for variable size problems
        run: |
          # Find the installed package location by importing optiprofiler
          PACKAGE_DIR=$(python -c "import optiprofiler; import os; print(os.path.dirname(optiprofiler.__file__))")
          CONFIG_PATH="$PACKAGE_DIR/problem_libs/s2mpj/config.txt"
          echo "Modifying config at: $CONFIG_PATH"
          echo "variable_size=all" > "$CONFIG_PATH"
          echo "test_feasibility_problems=2" >> "$CONFIG_PATH"
          cat "$CONFIG_PATH"
        shell: bash

      - name: Create output directory
        run: mkdir -p output
        shell: bash

      - name: Run all feature tests
        run: |
          cd output
          python ../python/optiprofiler/action_tests/test_all_features.py "os_${{ runner.os }}_py${{ matrix.python-version }}"
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: out_${{ matrix.os }}_py${{ matrix.python-version }}
          path: output/
