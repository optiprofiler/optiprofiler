# Python test multi-OS: Test all 11 features on multiple OS and Python versions

name: Python test multi-OS

on:
  push:
    branches: [main, python]
  pull_request:
    branches: [main, python]
  workflow_dispatch:

jobs:

  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout bundled S2MPJ
        run: git submodule update --init --depth 1 python/optiprofiler/problem_libs/s2mpj

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install --progress-bar=off ".[tests]"

      - name: Create output directory
        run: mkdir -p output
        shell: bash

      - name: Run all feature tests
        run: |
          cd output
          python ../python/optiprofiler/action_tests/test_all_features.py "os_${{ runner.os }}_py${{ matrix.python-version }}"
        env:
          S2MPJ_VARIABLE_SIZE: all
          S2MPJ_TEST_FEASIBILITY_PROBLEMS: 2
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: out_${{ matrix.os }}_py${{ matrix.python-version }}
          path: output/
